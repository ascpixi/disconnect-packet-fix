name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build

      - name: Read mod version
        id: version
        run: echo "mod_version=$(grep '^mod_version' gradle.properties | cut -d= -f2 | tr -d ' ')" >> "$GITHUB_OUTPUT"

      - name: Upload NeoForge artifact
        uses: actions/upload-artifact@v4
        with:
          name: disconnect-packet-fix-neoforge-${{ steps.version.outputs.mod_version }}
          path: neoforge/build/libs/disconnect-packet-fix-neoforge-${{ steps.version.outputs.mod_version }}.jar

      - name: Upload Fabric artifact
        uses: actions/upload-artifact@v4
        with:
          name: disconnect-packet-fix-fabric-${{ steps.version.outputs.mod_version }}
          path: fabric/build/libs/disconnect-packet-fix-fabric-${{ steps.version.outputs.mod_version }}.jar
